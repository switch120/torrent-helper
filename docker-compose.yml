services:
  torrentHost:
    image: haugene/transmission-openvpn:5.4.1
    container_name: transmission
    restart: unless-stopped
    privileged: true
    volumes:
      - trans-data:/data
      # New installs persist haugene/Transmission config here. Do not auto-migrate
      # legacy /data/transmission-home from the NFS-backed data volume.
      - trans-config:/config
      - .:/usr/src/app
    env_file:
      - .env
    environment:
      OPENVPN_OPTS: "${OPENVPN_OPTS:-} --inactive 3600 --ping 10 --ping-exit 60"
    cap_add:
      - NET_ADMIN
    logging:
      driver: json-file
      options:
        max-size: 10m
    ports:
      - 9091:9091
      # PIA assigns a dynamic forwarded peer port; verify it before publishing peer ports.
  torrentHelper:
    image: node:22-alpine
    restart: unless-stopped
    environment:
      - CONTAINERIZED=true
    env_file:
      - .env
    depends_on:
      torrentHost:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    command: npm run --prefix /usr/src/app start
volumes:
  trans-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=the-source.local,rw
      device: ":/volume1/video"
  trans-config:
    driver: local
