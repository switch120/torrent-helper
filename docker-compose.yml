services:
  releaseDb:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${RELEASE_DB_USER:-release}"
      POSTGRES_PASSWORD: "${RELEASE_DB_PASSWORD:-release}"
      POSTGRES_DB: "${RELEASE_DB_NAME:-release_hub}"
    volumes:
      - release-db18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RELEASE_DB_USER:-release} -d ${RELEASE_DB_NAME:-release_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${RELEASE_DB_PORT:-5433}:5432"
  releaseApi:
    image: node:22-alpine
    restart: unless-stopped
    user: "${HOST_UID:-501}:${HOST_GID:-20}"
    working_dir: /usr/src/app/apps/api
    environment:
      DATABASE_URL: "postgresql://${RELEASE_DB_USER:-release}:${RELEASE_DB_PASSWORD:-release}@releaseDb:5432/${RELEASE_DB_NAME:-release_hub}"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
      OPENAI_TORRENT_RERANK_ENABLED: "${OPENAI_TORRENT_RERANK_ENABLED:-true}"
      AUTH0_DOMAIN: "${AUTH0_DOMAIN:-}"
      AUTH0_AUDIENCE: "${AUTH0_AUDIENCE:-}"
      AUTH0_CLIENT_ID: "${AUTH0_CLIENT_ID:-}"
      PROWLARR_BASE_URL: "${PROWLARR_BASE_URL:-http://prowlarr:9696}"
      PROWLARR_API_KEY: "${PROWLARR_API_KEY:-}"
      TRANSMISSION_RPC_HOST: "${TRANSMISSION_RPC_HOST:-torrentHost}"
      TRANSMISSION_RPC_PORT: "${TRANSMISSION_RPC_PORT:-9091}"
      TRANSMISSION_RPC_USERNAME: "${TRANSMISSION_RPC_USERNAME:-}"
      TRANSMISSION_RPC_PASSWORD: "${TRANSMISSION_RPC_PASSWORD:-}"
      RELEASE_WEB_ORIGIN: "${RELEASE_WEB_ORIGIN:-http://localhost:4200}"
      PORT: 3001
      NPM_CONFIG_CACHE: /tmp/.npm-cache
    depends_on:
      releaseDb:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    command: sh -c "npm install && npm run prisma:generate && npm run prisma:deploy && npm run start:dev"
    ports:
      - "127.0.0.1:${RELEASE_API_PORT:-3001}:3001"
  releaseWeb:
    image: node:22-alpine
    restart: unless-stopped
    user: "${HOST_UID:-501}:${HOST_GID:-20}"
    working_dir: /usr/src/app/apps/web
    environment:
      API_PROXY_TARGET: http://releaseApi:3001
      NPM_CONFIG_CACHE: /tmp/.npm-cache
    depends_on:
      - releaseApi
    volumes:
      - .:/usr/src/app
    command: sh -c "npm install && npm run start"
    ports:
      - "127.0.0.1:${RELEASE_WEB_PORT:-4200}:4200"
  prowlarr:
    image: lscr.io/linuxserver/prowlarr@sha256:a89f252d6a22bd25af14a5380aec0adcc3c3af2e3282164f981680e6844070f3
    restart: unless-stopped
    environment:
      PUID: "${HOST_UID:-501}"
      PGID: "${HOST_GID:-20}"
      TZ: "${TZ:-America/New_York}"
    volumes:
      - prowlarr-config:/config
    ports:
      - "127.0.0.1:${PROWLARR_PORT:-9696}:9696"
  torrentHost:
    image: haugene/transmission-openvpn:5.4.1
    container_name: transmission
    restart: unless-stopped
    privileged: true
    volumes:
      - trans-data:/data
      # New installs persist haugene/Transmission config here. Do not auto-migrate
      # legacy /data/transmission-home from the NFS-backed data volume.
      - trans-config:/config
      - .:/usr/src/app
    environment:
      OPENVPN_PROVIDER: "${OPENVPN_PROVIDER:-PIA}"
      OPENVPN_CONFIG: "${OPENVPN_CONFIG:-US East}"
      OPENVPN_USERNAME: "${OPENVPN_USERNAME:-}"
      OPENVPN_PASSWORD: "${OPENVPN_PASSWORD:-}"
      OPENVPN_OPTS: "${OPENVPN_OPTS:-} --inactive 3600 --ping 10 --ping-exit 60"
      WEBPROXY_ENABLED: "${WEBPROXY_ENABLED:-false}"
      LOCAL_NETWORK: "${LOCAL_NETWORK:-192.168.0.0/16}"
      PUID: "${HOST_UID:-501}"
      PGID: "${HOST_GID:-20}"
      TRANSMISSION_RPC_USERNAME: "${TRANSMISSION_RPC_USERNAME:-}"
      TRANSMISSION_RPC_PASSWORD: "${TRANSMISSION_RPC_PASSWORD:-}"
    cap_add:
      - NET_ADMIN
    logging:
      driver: json-file
      options:
        max-size: 10m
    ports:
      - "127.0.0.1:${TRANSMISSION_WEB_PORT:-9091}:9091"
      # PIA assigns a dynamic forwarded peer port; verify it before publishing peer ports.
volumes:
  release-db18:
    driver: local
  trans-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=the-source.local,rw
      device: ":/volume1/video"
  trans-config:
    driver: local
  prowlarr-config:
    driver: local
