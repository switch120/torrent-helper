<nav class="app-nav" aria-label="Release hub navigation">
  <div class="nav-links">
    <a routerLink="/" queryParamsHandling="preserve">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 3v3M17 3v3M4 9h16M6 5h12a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/>
        <path d="M8 13h3M8 16h6"/>
      </svg>
      Release weeks
    </a>
    <a [routerLink]="modalRoute('favorites')" queryParamsHandling="preserve">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1-5.4-2.9-5.4 2.9 1-6.1-4.4-4.3 6.1-.9L12 3Z"/>
      </svg>
      Favorites
    </a>
    <a [routerLink]="modalRoute('downloads')" queryParamsHandling="preserve">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3v10M8 9l4 4 4-4"/>
        <path d="M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/>
      </svg>
      Downloads
    </a>
  </div>

  <div class="auth-actions">
    @if (auth.user$ | async; as user) {
      <span>{{ user.email }}</span>
    }
    @if (auth.isAuthenticated$ | async) {
      <button type="button" class="borderless-button" (click)="logout()">Logout</button>
    } @else {
      <button type="button" class="refresh-button" (click)="login()">Login with Google</button>
    }
  </div>
</nav>

<router-outlet />

<div class="route-modal-backdrop" [class.is-open]="modalActive()" (click)="closeModal()" [attr.aria-hidden]="!modalActive()">
  <aside class="route-modal-panel" role="dialog" aria-modal="true" aria-label="Release hub panel" (click)="$event.stopPropagation()">
    @if (modalActive()) {
      <button type="button" class="route-modal-close" (click)="closeModal()" aria-label="Close panel">&times;</button>
    }
    <router-outlet name="modal" (activate)="onModalActivate()" (deactivate)="onModalDeactivate()" />
  </aside>
</div>
